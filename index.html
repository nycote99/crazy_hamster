<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Hub du Hamster</title>
    <style>
        body {
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #e6a45e; }
        .menu {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .card {
            background: #34495e;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            width: 150px;
            text-align: center;
            transition: transform 0.2s, background 0.2s;
            border: 2px solid transparent;
        }
        .card:hover {
            transform: translateY(-10px);
            background: #e6a45e;
            border-color: white;
        }
        .icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🐹 MENU HAMSTER 🐹</h1>
    <p>Choisis ton activité :</p>

    <div class="menu">
        <a href="timer.html" class="card">
            <div class="icon">⏱️</div>
            <div>Timer 4 min</div>
        </a>

        <a href="jeu.html" class="card">
            <div class="icon">🏁</div>
            <div>Labyrinthe</div>
        </a>
    </div>

</body>
</html>
