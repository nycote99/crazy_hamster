<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐹 Crazy Hamster - Labyrinthe</title>
    <style>
        :root {
            --wood: #a67c52;
            --light-wood: #f0e6d2;
            --hamster-bg: #e6ccb2;
            --exit: #4caf50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--hamster-bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none; /* Empêche le scroll accidentel sur mobile */
            overflow: hidden;
        }

        h1 { color: #5d4037; margin: 10px 0; font-size: 1.2rem; }

        /* Interface de contrôle */
        #ui-layer {
            background: var(--light-wood);
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid var(--wood);
        }

        select, button {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--wood);
            font-size: 1rem;
        }

        canvas {
            background-color: white;
            border: 5px solid var(--wood);
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Contrôles tactiles pour iPhone */
        #mobile-controls {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background: var(--wood);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .btn:active { background: #5d4037; transform: scale(0.9); }
        #btn-up { grid-column: 2; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <h1>🐹 Labyrinthe Royal</h1>

    <div id="ui-layer">
        <label for="difficulty"><b>Taille :</b></label>
        <select id="difficulty" onchange="changeDifficulty(this.value)">
            <option value="15">Nain (15x15)</option>
            <option value="25" selected>Syrien (25x25)</option>
            <option value="35">Expert (35x35)</option>
        </select>
        <button onclick="initGame()">🔄</button>
    </div>

    <canvas id="mazeCanvas"></canvas>

    <div id="mobile-controls">
        <button class="btn" id="btn-up" onclick="move(0, -1)">▲</button>
        <button class="btn" id="btn-left" onclick="move(-1, 0)">◀</button>
        <button class="btn" id="btn-down" onclick="move(0, 1)">▼</button>
        <button class="btn" id="btn-right" onclick="move(1, 0)">▶</button>
    </div>

    <script>
        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        
        let gridSize = 25;
        let cellSize;
        let grid = [];
        let player = { x: 1, y: 1 };
        let goal = { x: 0, y: 0 };

        function changeDifficulty(val) {
            gridSize = parseInt(val);
            initGame();
        }

        function initGame() {
            // Adaptation à l'écran mobile
            const size = Math.min(window.innerWidth * 0.9, 400);
            canvas.width = size;
            canvas.height = size;
            cellSize = canvas.width / gridSize;

            generateMaze();
            player = { x: 1, y: 1 };
            draw();
        }

        function generateMaze() {
            grid = Array(gridSize).fill().map(() => Array(gridSize).fill(1));
            
            function walk(x, y) {
                grid[y][x] = 0;
                const dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
                
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < gridSize && ny > 0 && ny < gridSize && grid[ny][nx] === 1) {
                        grid[y + dy/2][x + dx/2] = 0;
                        walk(nx, ny);
                    }
                }
            }

            walk(1, 1);
            goal = { x: gridSize - 2, y: gridSize - 2 };
            grid[goal.y][goal.x] = 2; // Sortie
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < gridSize; y++) {
                for (let x = 0; x < gridSize; x++) {
                    if (grid[y][x] === 1) {
                        ctx.fillStyle = '#5d4037';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    } else if (grid[y][x] === 2) {
                        ctx.fillStyle = '#4caf50';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    }
                }
            }
            // Dessin du Hamster
            ctx.fillStyle = '#ffcc80';
            ctx.beginPath();
            ctx.arc((player.x + 0.5) * cellSize, (player.y + 0.5) * cellSize, cellSize/3, 0, Math.PI * 2);
            ctx.fill();
        }

        function move(dx, dy) {
            let nx = player.x + dx;
            let ny = player.y + dy;
            if (grid[ny] && (grid[ny][nx] === 0 || grid[ny][nx] === 2)) {
                player.x = nx;
                player.y = ny;
                draw();
                if (grid[ny][nx] === 2) {
                    setTimeout(() => { alert("Miam ! Le hamster a trouvé la sortie ! 🐹🌽"); initGame(); }, 100);
                }
            }
        }

        // Contrôles clavier
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') move(0, -1);
            if (e.key === 'ArrowDown') move(0, 1);
            if (e.key === 'ArrowLeft') move(-1, 0);
            if (e.key === 'ArrowRight') move(1, 0);
        });

        initGame();
    </script>
</body>
</html>
